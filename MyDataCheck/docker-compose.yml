version: '3.8'

# 生产环境配置 - x86架构（用于部署）
# 使用方式: docker-compose up -d

services:
  mydatacheck:
    build:
      context: .
      dockerfile: Dockerfile
    image: mydatacheck:prod-amd64
    container_name: mydatacheck-prod
    # 指定运行平台为x86_64（amd64）
    platform: linux/amd64
    ports:
      - "5001:5001"
    volumes:
      # 挂载数据目录，方便导入导出文件
      - ./inputdata:/app/inputdata
      - ./outputdata:/app/outputdata
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
