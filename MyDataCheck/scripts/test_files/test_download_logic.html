<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载逻辑测试工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f7fa;
        }

        .container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        h2 {
            color: #667eea;
            margin-top: 0;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .output {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-top: 10px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        .record {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            margin: 5px 0;
        }

        .record-key {
            font-weight: bold;
            color: #667eea;
        }

        .record-time {
            color: #666;
            font-size: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .input-group {
            margin: 10px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h1>📥 下载逻辑测试工具</h1>

    <div class="container">
        <h2>📊 统计信息</h2>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="file-count">0</div>
                <div class="stat-label">文件下载记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="task-count">0</div>
                <div class="stat-label">任务下载记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="storage-size">0 KB</div>
                <div class="stat-label">存储空间占用</div>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>🧪 测试操作</h2>

        <div class="input-group">
            <label>文件名：</label>
            <input type="text" id="test-filename" placeholder="例如: test_output_12251430.csv"
                value="test_output_12251430.csv">
        </div>

        <div class="input-group">
            <label>模块名：</label>
            <input type="text" id="test-module" placeholder="例如: api_comparison" value="api_comparison">
        </div>

        <button class="btn btn-success" onclick="testMarkDownloaded()">✅ 标记为已下载</button>
        <button class="btn" onclick="testCheckDownloaded()">🔍 检查下载状态</button>

        <hr style="margin: 20px 0;">

        <div class="input-group">
            <label>任务ID：</label>
            <input type="text" id="test-taskid" placeholder="例如: task_123456" value="task_123456">
        </div>

        <button class="btn btn-success" onclick="testMarkTaskDownloaded()">✅ 标记任务已下载</button>
        <button class="btn" onclick="testCheckTaskDownloaded()">🔍 检查任务状态</button>

        <div class="output" id="test-output"></div>
    </div>

    <div class="container">
        <h2>📋 文件下载记录</h2>
        <button class="btn" onclick="refreshFileRecords()">🔄 刷新</button>
        <button class="btn btn-danger" onclick="clearFileRecords()">🗑️ 清空记录</button>
        <button class="btn" onclick="cleanupFileRecords()">🧹 清理过期记录</button>
        <div class="output" id="file-records"></div>
    </div>

    <div class="container">
        <h2>📋 任务下载记录</h2>
        <button class="btn" onclick="refreshTaskRecords()">🔄 刷新</button>
        <button class="btn btn-danger" onclick="clearTaskRecords()">🗑️ 清空记录</button>
        <button class="btn" onclick="cleanupTaskRecords()">🧹 清理过期记录</button>
        <div class="output" id="task-records"></div>
    </div>

    <div class="container">
        <h2>🔧 高级操作</h2>
        <button class="btn btn-danger" onclick="clearAllRecords()">🗑️ 清空所有记录</button>
        <button class="btn" onclick="exportRecords()">📤 导出记录</button>
        <button class="btn" onclick="importRecords()">📥 导入记录</button>
    </div>

    <script>
        // 从 auto-download.js 复制的函数
        const DOWNLOAD_HISTORY_KEY = 'myDataCheck_downloadHistory';
        const DOWNLOADED_TASKS_KEY = 'myDataCheck_downloadedTasks';

        function getDownloadHistory() {
            try {
                const data = localStorage.getItem(DOWNLOAD_HISTORY_KEY);
                return data ? JSON.parse(data) : {};
            } catch (e) {
                return {};
            }
        }

        function markFileDownloaded(filename, module) {
            try {
                const history = getDownloadHistory();
                const key = `${module}:${filename}`;
                history[key] = {
                    filename,
                    module,
                    downloadTime: new Date().toISOString()
                };
                localStorage.setItem(DOWNLOAD_HISTORY_KEY, JSON.stringify(history));
                return true;
            } catch (e) {
                console.error('保存下载记录失败:', e);
                return false;
            }
        }

        function isFileDownloaded(filename, module) {
            const history = getDownloadHistory();
            const key = `${module}:${filename}`;
            return !!history[key];
        }

        function getDownloadedTasks() {
            try {
                const data = localStorage.getItem(DOWNLOADED_TASKS_KEY);
                return data ? JSON.parse(data) : {};
            } catch (e) {
                return {};
            }
        }

        function markTaskDownloaded(taskId) {
            try {
                const downloaded = getDownloadedTasks();
                downloaded[taskId] = {
                    taskId,
                    downloadTime: new Date().toISOString()
                };
                localStorage.setItem(DOWNLOADED_TASKS_KEY, JSON.stringify(downloaded));
                return true;
            } catch (e) {
                console.error('保存任务下载记录失败:', e);
                return false;
            }
        }

        function isTaskDownloaded(taskId) {
            const downloaded = getDownloadedTasks();
            return !!downloaded[taskId];
        }

        // 测试函数
        function testMarkDownloaded() {
            const filename = document.getElementById('test-filename').value;
            const module = document.getElementById('test-module').value;

            if (!filename || !module) {
                log('❌ 请输入文件名和模块名', 'test-output');
                return;
            }

            const success = markFileDownloaded(filename, module);
            if (success) {
                log(`✅ 已标记文件为已下载: ${module}:${filename}`, 'test-output');
                refreshStats();
                refreshFileRecords();
            } else {
                log('❌ 标记失败', 'test-output');
            }
        }

        function testCheckDownloaded() {
            const filename = document.getElementById('test-filename').value;
            const module = document.getElementById('test-module').value;

            if (!filename || !module) {
                log('❌ 请输入文件名和模块名', 'test-output');
                return;
            }

            const downloaded = isFileDownloaded(filename, module);
            if (downloaded) {
                log(`✅ 文件已下载: ${module}:${filename}`, 'test-output');
            } else {
                log(`❌ 文件未下载: ${module}:${filename}`, 'test-output');
            }
        }

        function testMarkTaskDownloaded() {
            const taskId = document.getElementById('test-taskid').value;

            if (!taskId) {
                log('❌ 请输入任务ID', 'test-output');
                return;
            }

            const success = markTaskDownloaded(taskId);
            if (success) {
                log(`✅ 已标记任务为已下载: ${taskId}`, 'test-output');
                refreshStats();
                refreshTaskRecords();
            } else {
                log('❌ 标记失败', 'test-output');
            }
        }

        function testCheckTaskDownloaded() {
            const taskId = document.getElementById('test-taskid').value;

            if (!taskId) {
                log('❌ 请输入任务ID', 'test-output');
                return;
            }

            const downloaded = isTaskDownloaded(taskId);
            if (downloaded) {
                log(`✅ 任务已下载: ${taskId}`, 'test-output');
            } else {
                log(`❌ 任务未下载: ${taskId}`, 'test-output');
            }
        }

        function refreshFileRecords() {
            const history = getDownloadHistory();
            const container = document.getElementById('file-records');

            if (Object.keys(history).length === 0) {
                container.innerHTML = '暂无文件下载记录';
                return;
            }

            let html = '';
            for (const key in history) {
                const record = history[key];
                html += `
                    <div class="record">
                        <div class="record-key">${key}</div>
                        <div class="record-time">下载时间: ${formatTime(record.downloadTime)}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function refreshTaskRecords() {
            const tasks = getDownloadedTasks();
            const container = document.getElementById('task-records');

            if (Object.keys(tasks).length === 0) {
                container.innerHTML = '暂无任务下载记录';
                return;
            }

            let html = '';
            for (const taskId in tasks) {
                const record = tasks[taskId];
                html += `
                    <div class="record">
                        <div class="record-key">${taskId}</div>
                        <div class="record-time">下载时间: ${formatTime(record.downloadTime)}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function refreshStats() {
            const fileHistory = getDownloadHistory();
            const taskHistory = getDownloadedTasks();

            document.getElementById('file-count').textContent = Object.keys(fileHistory).length;
            document.getElementById('task-count').textContent = Object.keys(taskHistory).length;

            const fileSize = JSON.stringify(fileHistory).length;
            const taskSize = JSON.stringify(taskHistory).length;
            const totalSize = (fileSize + taskSize) / 1024;
            document.getElementById('storage-size').textContent = totalSize.toFixed(2) + ' KB';
        }

        function clearFileRecords() {
            if (confirm('确定要清空所有文件下载记录吗？')) {
                localStorage.removeItem(DOWNLOAD_HISTORY_KEY);
                log('✅ 已清空文件下载记录', 'test-output');
                refreshStats();
                refreshFileRecords();
            }
        }

        function clearTaskRecords() {
            if (confirm('确定要清空所有任务下载记录吗？')) {
                localStorage.removeItem(DOWNLOADED_TASKS_KEY);
                log('✅ 已清空任务下载记录', 'test-output');
                refreshStats();
                refreshTaskRecords();
            }
        }

        function cleanupFileRecords() {
            const history = getDownloadHistory();
            const now = new Date();
            const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            let cleaned = 0;
            for (const key in history) {
                const record = history[key];
                if (record.downloadTime) {
                    const downloadTime = new Date(record.downloadTime);
                    if (downloadTime < sevenDaysAgo) {
                        delete history[key];
                        cleaned++;
                    }
                }
            }

            if (cleaned > 0) {
                localStorage.setItem(DOWNLOAD_HISTORY_KEY, JSON.stringify(history));
                log(`✅ 已清理 ${cleaned} 条过期记录（超过7天）`, 'test-output');
                refreshStats();
                refreshFileRecords();
            } else {
                log('ℹ️ 没有需要清理的过期记录', 'test-output');
            }
        }

        function cleanupTaskRecords() {
            const tasks = getDownloadedTasks();
            const now = new Date();
            const thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);

            let cleaned = 0;
            for (const taskId in tasks) {
                const record = tasks[taskId];
                if (record.downloadTime) {
                    const downloadTime = new Date(record.downloadTime);
                    if (downloadTime < thirtyDaysAgo) {
                        delete tasks[taskId];
                        cleaned++;
                    }
                }
            }

            if (cleaned > 0) {
                localStorage.setItem(DOWNLOADED_TASKS_KEY, JSON.stringify(tasks));
                log(`✅ 已清理 ${cleaned} 条过期记录（超过30天）`, 'test-output');
                refreshStats();
                refreshTaskRecords();
            } else {
                log('ℹ️ 没有需要清理的过期记录', 'test-output');
            }
        }

        function clearAllRecords() {
            if (confirm('确定要清空所有下载记录吗？此操作不可恢复！')) {
                localStorage.removeItem(DOWNLOAD_HISTORY_KEY);
                localStorage.removeItem(DOWNLOADED_TASKS_KEY);
                log('✅ 已清空所有下载记录', 'test-output');
                refreshStats();
                refreshFileRecords();
                refreshTaskRecords();
            }
        }

        function exportRecords() {
            const data = {
                fileHistory: getDownloadHistory(),
                taskHistory: getDownloadedTasks(),
                exportTime: new Date().toISOString()
            };

            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `download_records_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            log('✅ 已导出下载记录', 'test-output');
        }

        function importRecords() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.fileHistory) {
                            localStorage.setItem(DOWNLOAD_HISTORY_KEY, JSON.stringify(data.fileHistory));
                        }
                        if (data.taskHistory) {
                            localStorage.setItem(DOWNLOADED_TASKS_KEY, JSON.stringify(data.taskHistory));
                        }
                        log('✅ 已导入下载记录', 'test-output');
                        refreshStats();
                        refreshFileRecords();
                        refreshTaskRecords();
                    } catch (err) {
                        log('❌ 导入失败: ' + err.message, 'test-output');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function log(message, outputId) {
            const output = document.getElementById(outputId);
            const time = new Date().toLocaleTimeString();
            output.textContent = `[${time}] ${message}\n` + output.textContent;
        }

        function formatTime(isoString) {
            if (!isoString) return '未知';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN');
        }

        // 页面加载时刷新数据
        window.onload = function () {
            refreshStats();
            refreshFileRecords();
            refreshTaskRecords();
        };
    </script>
</body>

</html>
