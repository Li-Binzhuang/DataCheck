name: Build Docker Image

on:
  push:
    branches: [main, master]
    paths:
      - 'MyDataCheck/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'MyDataCheck/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          TAGS="ghcr.io/${REPO_LOWER}:${SHA_SHORT}"
          TAGS="${TAGS},ghcr.io/${REPO_LOWER}:${{ github.ref_name }}"
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            TAGS="${TAGS},ghcr.io/${REPO_LOWER}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./MyDataCheck
          file: ./MyDataCheck/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false

      - name: Verify image architecture
        if: github.event_name != 'pull_request'
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          docker pull --platform linux/amd64 "ghcr.io/${REPO_LOWER}:${SHA_SHORT}"
          echo "=== Image inspect ==="
          docker inspect "ghcr.io/${REPO_LOWER}:${SHA_SHORT}" | grep -E "Architecture|Os"
          echo "=== Verify binary is actually x86_64 ==="
          docker run --rm --platform linux/amd64 "ghcr.io/${REPO_LOWER}:${SHA_SHORT}" python -c "import platform; print(f'Machine: {platform.machine()}, Arch: {platform.architecture()}')"
