<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>菜单切换测试</title>
    <style>
        .menu-item { padding: 10px; cursor: pointer; border: 1px solid #ccc; margin: 5px; }
        .menu-item.active { background: #667eea; color: white; }
        .content-section { display: none; padding: 20px; border: 1px solid #ccc; margin: 10px; }
        .content-section.active { display: block; }
    </style>
</head>
<body>
    <h1>菜单切换测试</h1>
    
    <div class="sidebar-menu">
        <div class="menu-item active" onclick="switchPage('api')">接口数据对比</div>
        <div class="menu-item" onclick="switchPage('online')">线上灰度落数对比</div>
        <div class="menu-item" onclick="switchPage('compare')">数据对比</div>
    </div>
    
    <div id="page-api" class="content-section active">
        <h2>接口数据对比页面</h2>
        <p>这是接口数据对比的内容</p>
    </div>
    
    <div id="page-online" class="content-section">
        <h2>线上灰度落数对比页面</h2>
        <p>这是线上灰度落数对比的内容</p>
    </div>
    
    <div id="page-compare" class="content-section">
        <h2>数据对比页面</h2>
        <p>这是数据对比的内容</p>
    </div>
    
    <script>
        function switchPage(pageName) {
            console.log('切换到页面:', pageName);
            
            // 隐藏所有页面
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            
            // 移除所有菜单项的active状态
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // 显示选中的页面
            const targetPage = document.getElementById(`page-${pageName}`);
            if (targetPage) {
                targetPage.classList.add('active');
                console.log('页面已显示:', pageName);
            } else {
                console.error('找不到页面:', `page-${pageName}`);
            }
            
            // 激活对应的菜单项
            if (event && event.target) {
                const menuItem = event.target.closest('.menu-item');
                if (menuItem) {
                    menuItem.classList.add('active');
                    console.log('菜单项已激活');
                }
            }
        }
    </script>
</body>
</html>
